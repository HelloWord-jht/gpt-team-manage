services:
  team-bus-manager:
    build: .
    image: gpt-team-manage:latest
    container_name: gpt-team-manage
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5176
      DATA_PATH: /app/data/team-bus.json
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      REMINDER_TO: ${REMINDER_TO:-}
      REMINDER_DAYS: ${REMINDER_DAYS:-7}
    ports:
      - "5176:5176"
    volumes:
      - ./data:/app/data
